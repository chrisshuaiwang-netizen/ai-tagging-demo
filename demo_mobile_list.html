<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>移动端 · 文件列表（AI 标签筛选）</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
  background: #d1d5db;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 24px 0;
}

/* ─── Phone Shell ─── */
.phone {
  width: 390px;
  height: 844px;
  background: #f5f6fa;
  border-radius: 44px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 24px 64px rgba(0,0,0,0.35), inset 0 0 0 1px rgba(255,255,255,0.15);
  flex-shrink: 0;
}

/* ─── Status bar ─── */
.status-bar {
  height: 44px;
  background: #fff;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  font-size: 13px;
  font-weight: 600;
  color: #111;
  flex-shrink: 0;
}
.status-right { display: flex; align-items: center; gap: 5px; font-size: 12px; }

/* ─── Header ─── */
.header {
  height: 44px;
  background: #fff;
  display: flex;
  align-items: center;
  padding: 0 16px;
  border-bottom: 1px solid #f0f0f0;
  flex-shrink: 0;
}
.header-title { flex: 1; text-align: center; font-size: 17px; font-weight: 600; color: #111; }
.header-icon { font-size: 18px; color: #555; cursor: pointer; width: 28px; text-align: center; }

/* ─── Page tabs ─── */
.page-tabs {
  background: #fff;
  display: flex;
  border-bottom: 1px solid #f0f0f0;
  flex-shrink: 0;
}
.page-tab {
  flex: 1;
  text-align: center;
  padding: 13px 0;
  font-size: 15px;
  color: #888;
  cursor: pointer;
  position: relative;
}
.page-tab.active { color: #5b52f0; font-weight: 600; }
.page-tab.active::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 28px;
  height: 2px;
  background: #5b52f0;
  border-radius: 2px;
}

/* ─── Search bar ─── */
.search-bar {
  background: #fff;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid #f0f0f0;
  flex-shrink: 0;
}
.search-input-box {
  flex: 1;
  background: #f2f3f7;
  border-radius: 9px;
  padding: 8px 12px;
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 14px;
  color: #aaa;
}
.multiselect-btn { font-size: 14px; color: #5b52f0; font-weight: 500; cursor: pointer; white-space: nowrap; }

/* ─── Filter row ─── */
.filter-row {
  background: #fff;
  display: flex;
  align-items: center;
  border-bottom: 1px solid #f0f0f0;
  flex-shrink: 0;
  overflow-x: auto;
}
.filter-row::-webkit-scrollbar { display: none; }
.filter-left { padding: 0 14px; }
.filter-right { display: flex; align-items: center; margin-left: auto; border-left: 1px solid #f0f0f0; }
.filt-btn {
  padding: 11px 10px;
  font-size: 13px;
  color: #333;
  cursor: pointer;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 3px;
}
.filt-btn + .filt-btn { border-left: 1px solid #f0f0f0; }
.filt-btn.active { color: #5b52f0; }
.filt-arrow { font-size: 9px; color: #ccc; transition: color 0.15s; }
.filt-btn.active .filt-arrow { color: #5b52f0; }
.filt-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 16px;
  height: 16px;
  padding: 0 4px;
  background: #5b52f0;
  color: #fff;
  border-radius: 8px;
  font-size: 10px;
  font-weight: 700;
  margin-left: 1px;
}

/* ─── Active filter strip ─── */
.active-strip {
  display: none;
  align-items: center;
  flex-wrap: wrap;
  gap: 6px;
  padding: 8px 14px;
  background: #fff;
  border-bottom: 1px solid #f0f0f0;
}
.active-strip.show { display: flex; }
.strip-label { font-size: 12px; color: #aaa; }
.strip-chip {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  background: #eeedf9;
  border-radius: 12px;
  font-size: 12px;
  color: #5b52f0;
  cursor: pointer;
}
.strip-remove { font-size: 13px; color: #a09ce0; }
.strip-clear { font-size: 12px; color: #ef4444; margin-left: 2px; cursor: pointer; }

/* ─── File list ─── */
.file-scroll {
  flex: 1;
  overflow-y: auto;
  background: #f5f6fa;
  padding: 12px;
  /* calculated dynamically via JS */
}
.file-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.file-card {
  background: #fff;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
}
.file-thumb {
  width: 100%;
  aspect-ratio: 4/3;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 38px;
}
.file-body {
  padding: 8px 10px 10px;
}
.file-name {
  font-size: 12px;
  color: #222;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 3px;
}
.file-date { font-size: 11px; color: #bbb; }
.file-ai-chips { display: flex; flex-wrap: wrap; gap: 3px; padding: 0 10px 8px; }
.file-ai-chip {
  font-size: 10px;
  padding: 2px 6px;
  background: #eff6ff;
  color: #1d4ed8;
  border: 1px solid #bfdbfe;
  border-radius: 8px;
  white-space: nowrap;
}

/* ─── Bottom nav ─── */
.bottom-nav {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 80px;
  background: #fff;
  border-top: 1px solid #eee;
  display: flex;
  align-items: flex-start;
  padding-top: 10px;
}
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  cursor: pointer;
  font-size: 11px;
  color: #aaa;
}
.nav-item.active { color: #5b52f0; }
.nav-svg { width: 24px; height: 24px; }

/* ─── Scrim ─── */
.scrim {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 100;
  display: none;
}
.scrim.show { display: block; }

/* ─── Bottom sheet ─── */
.bottom-sheet {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: #fff;
  border-radius: 18px 18px 0 0;
  z-index: 110;
  transform: translateY(100%);
  transition: transform 0.28s cubic-bezier(0.32, 0.72, 0, 1);
  padding-bottom: 30px;
}
.bottom-sheet.show { transform: translateY(0); }
.sheet-handle { width: 36px; height: 4px; background: #e0e0e0; border-radius: 2px; margin: 10px auto 0; }
.sheet-title { font-size: 16px; font-weight: 600; color: #111; padding: 14px 20px 12px; }
.sheet-divider { height: 1px; background: #f2f2f2; }
.sheet-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 15px 20px;
  font-size: 15px;
  color: #222;
  cursor: pointer;
  border-bottom: 1px solid #f5f5f5;
}
.sheet-row-right {
  display: flex;
  align-items: center;
  gap: 8px;
  color: #bbb;
  font-size: 18px;
  line-height: 1;
}
.row-sel-badge {
  font-size: 12px;
  background: #5b52f0;
  color: #fff;
  border-radius: 10px;
  padding: 1px 8px;
  min-width: 20px;
  text-align: center;
  display: none;
}
.sheet-actions {
  display: flex;
  gap: 12px;
  padding: 16px 20px 0;
}
.sheet-reset {
  flex: 1;
  padding: 13px;
  border-radius: 12px;
  background: #f2f3f7;
  border: none;
  font-size: 15px;
  color: #333;
  cursor: pointer;
  font-weight: 500;
}
.sheet-confirm {
  flex: 2;
  padding: 13px;
  border-radius: 12px;
  background: #5b52f0;
  border: none;
  font-size: 15px;
  color: #fff;
  cursor: pointer;
  font-weight: 600;
}

/* ─── Full-screen selector ─── */
.fullscreen {
  position: absolute;
  inset: 0;
  background: #fff;
  z-index: 120;
  display: flex;
  flex-direction: column;
  transform: translateX(100%);
  transition: transform 0.28s cubic-bezier(0.32, 0.72, 0, 1);
}
.fullscreen.show { transform: translateX(0); }
.fs-header {
  display: flex;
  align-items: center;
  padding: 44px 16px 12px;
  border-bottom: 1px solid #f0f0f0;
  background: #fff;
  flex-shrink: 0;
  gap: 4px;
}
.fs-back {
  font-size: 26px;
  color: #333;
  cursor: pointer;
  padding: 0 8px 0 0;
  line-height: 1;
}
.fs-title { flex: 1; font-size: 17px; font-weight: 600; color: #111; }
.fs-match {
  font-size: 13px;
  color: #333;
  display: flex;
  align-items: center;
  gap: 3px;
  cursor: pointer;
}
.fs-search-wrap { padding: 10px 16px; flex-shrink: 0; }
.fs-search {
  width: 100%;
  background: #f2f3f7;
  border: none;
  border-radius: 10px;
  padding: 9px 14px;
  font-size: 14px;
  color: #333;
  display: flex;
  align-items: center;
  gap: 8px;
}
.fs-list { flex: 1; overflow-y: auto; }

/* Category row */
.cat-row {
  display: flex;
  align-items: center;
  padding: 14px 20px;
  gap: 12px;
  cursor: pointer;
  border-bottom: 1px solid #f5f5f5;
  background: #fafafa;
  user-select: none;
}
.cat-expand-arrow {
  font-size: 12px;
  color: #ccc;
  transition: transform 0.2s;
  width: 12px;
  flex-shrink: 0;
  margin-left: auto;
}
.cat-row.open .cat-expand-arrow { transform: rotate(90deg); }
.cat-label { flex: 1; font-size: 15px; color: #222; font-weight: 500; }
.cat-count { font-size: 13px; color: #5b52f0; }
.cat-children { display: none; }
.cat-row.open + .cat-children { display: block; }

/* Child row */
.child-row {
  display: flex;
  align-items: center;
  padding: 13px 20px 13px 52px;
  gap: 12px;
  cursor: pointer;
  border-bottom: 1px solid #f5f5f5;
  background: #fff;
  user-select: none;
}
.child-row:active { background: #f9f9f9; }
.child-label { font-size: 14px; color: #333; flex: 1; }

/* Checkbox */
.cb {
  width: 20px;
  height: 20px;
  border: 1.5px solid #d0d0d0;
  border-radius: 5px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #fff;
  transition: all 0.12s;
}
.cb.checked { background: #5b52f0; border-color: #5b52f0; }
.cb-tick { display: none; color: #fff; font-size: 12px; font-weight: 700; }
.cb.checked .cb-tick { display: block; }

.fs-actions {
  display: flex;
  gap: 12px;
  padding: 14px 20px 34px;
  border-top: 1px solid #f0f0f0;
  background: #fff;
  flex-shrink: 0;
}
.fs-cancel {
  flex: 1;
  padding: 13px;
  border-radius: 12px;
  background: #f2f3f7;
  border: none;
  font-size: 15px;
  color: #333;
  cursor: pointer;
  font-weight: 500;
}
.fs-confirm {
  flex: 2;
  padding: 13px;
  border-radius: 12px;
  background: #5b52f0;
  border: none;
  font-size: 15px;
  color: #fff;
  cursor: pointer;
  font-weight: 600;
}

/* Empty state */
.empty-state {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 24px;
  color: #bbb;
  gap: 10px;
}
.empty-state.show { display: flex; }
.empty-icon { font-size: 40px; }
.empty-text { font-size: 14px; }
</style>
</head>

  { id:2, icon:'🚗', bg:'#e8f5e9', name:'迈腾B9_贯穿尾灯_外观', date:'2026.03.24 14:20', tags:[{cat:'车型',val:'迈腾B9'},{cat:'商品亮点',val:'外观'},{cat:'内容来源',val:'官方发布'}] },
  { id:3, icon:'🎬', bg:'#fff3e0', name:'探岳L_驾乘感受_KOE', date:'2026.03.23 09:15', tags:[{cat:'车型',val:'全新探岳L'},{cat:'种草内容',val:'驾乘感受'},{cat:'内容来源',val:'KOE'}] },
  { id:4, icon:'⚡', bg:'#f3e5f5', name:'ID.7_内饰_展厅_官方', date:'2026.03.22 16:45', tags:[{cat:'车型',val:'ID.7 VIZZION'},{cat:'商品亮点',val:'内饰'},{cat:'内容来源',val:'官方发布'}] },
  { id:5, icon:'🏎️', bg:'#fce4ec', name:'高尔夫GTI_动感外观', date:'2026.03.21 11:00', tags:[{cat:'车型',val:'高尔夫GTI'},{cat:'商品亮点',val:'外观'},{cat:'种草内容',val:'讲车'}] },
  { id:6, icon:'🚗', bg:'#e8f5e9', name:'探岳_家庭出行_UGC', date:'2026.03.20 08:30', tags:[{cat:'车型',val:'全新探岳L'},{cat:'种草内容',val:'家庭'},{cat:'内容来源',val:'UGC'}] },
  { id:7, icon:'🎬', bg:'#e3f2fd', name:'迈腾B9_智驾演示_媒体', date:'2026.03.19 15:10', tags:[{cat:'车型',val:'迈腾B9'},{cat:'商品亮点',val:'智驾'},{cat:'内容来源',val:'媒体测评'}] },
  { id:8, icon:'🚗', bg:'#f9fbe7', name:'CC猎装_旅游公路', date:'2026.03.18 09:00', tags:[{cat:'车型',val:'CC猎装车'},{cat:'种草内容',val:'旅游'},{cat:'内容来源',val:'KOE'}] },
];

// ─── State ───
let pendingTags = {};  // pending (in selector)
let appliedTags = {};  // committed (filter active)

// ─── Init ───
renderFiles(FILES);
updateScrollHeight();

function updateScrollHeight() {
  const strip = document.getElementById('activeStrip');
  const isStripShown = strip.classList.contains('show');
  const stripH = isStripShown ? strip.offsetHeight : 0;
  const scroll = document.getElementById('fileScroll');
  // total phone height 844 - status(44) - header(44) - pagetabs(44) - search(~48) - filterrow(~40) - bottomnav(80) - strip
  scroll.style.height = (844 - 44 - 44 - 44 - 48 - 40 - 80 - stripH) + 'px';
}

function renderFiles(files) {
  const grid = document.getElementById('fileGrid');
  const empty = document.getElementById('emptyState');
  if (!files.length) {
    grid.style.display = 'none';
    empty.classList.add('show');
    return;
  }
  grid.style.display = 'grid';
  empty.classList.remove('show');
  grid.innerHTML = files.map(f => `
    <div class="file-card">
      <div class="file-thumb" style="background:${f.bg};">${f.icon}</div>
      <div class="file-body">
        <div class="file-name">${f.name}</div>
        <div class="file-date">${f.date}</div>
      </div>
      <div class="file-ai-chips">
        ${f.tags.slice(0,2).map(t=>`<span class="file-ai-chip">${t.val}</span>`).join('')}
      </div>
    </div>
  `).join('');
}

// ─── AI Sheet ───
function openAiSheet() {
  pendingTags = JSON.parse(JSON.stringify(appliedTags));
  document.getElementById('scrim').classList.add('show');
  document.getElementById('aiSheet').classList.add('show');
  updateRowBadge();
}

function closeAll() {
  document.getElementById('scrim').classList.remove('show');
  document.getElementById('aiSheet').classList.remove('show');
}

function confirmAiFilter() {
  appliedTags = JSON.parse(JSON.stringify(pendingTags));
  closeAll();
  updateFilterBtn();
  updateActiveStrip();
  filterFiles();
}

function clearAllAi() {
  pendingTags = {};
  appliedTags = {};
  updateRowBadge();
  updateFilterBtn();
  updateActiveStrip();
  filterFiles();
}

function updateRowBadge() {
  const total = Object.values(pendingTags).reduce((s,a)=>s+a.length, 0);
  const badge = document.getElementById('rowBadge');
  badge.textContent = total;
  badge.style.display = total > 0 ? '' : 'none';
}

function updateFilterBtn() {
  const total = Object.values(appliedTags).reduce((s,a)=>s+a.length, 0);
  const btn = document.getElementById('aiFilterBtn');
  btn.classList.toggle('active', total > 0);
  if (total > 0) {
    btn.innerHTML = `AI 标签 <span class="filt-badge">${total}</span>`;
  } else {
    btn.innerHTML = `AI 标签 <span class="filt-arrow">▾</span>`;
  }
}

function updateActiveStrip() {
  const strip = document.getElementById('activeStrip');
  const chips = document.getElementById('stripChips');
  const total = Object.values(appliedTags).reduce((s,a)=>s+a.length, 0);
  if (total > 0) {
    strip.classList.add('show');
    chips.innerHTML = Object.entries(appliedTags).flatMap(([cat,vals]) =>
      vals.map(v => `<span class="strip-chip" onclick="removeChip('${cat}','${v}')">${v} <span class="strip-remove">×</span></span>`)
    ).join('');
  } else {
    strip.classList.remove('show');
    chips.innerHTML = '';
  }
  updateScrollHeight();
}

function removeChip(cat, val) {
  if (appliedTags[cat]) {
    appliedTags[cat] = appliedTags[cat].filter(v=>v!==val);
    if (!appliedTags[cat].length) delete appliedTags[cat];
  }
  pendingTags = JSON.parse(JSON.stringify(appliedTags));
  updateFilterBtn();
  updateActiveStrip();
  filterFiles();
}

function filterFiles() {
  const hasFilter = Object.keys(appliedTags).length > 0;
  if (!hasFilter) { renderFiles(FILES); return; }
  const filtered = FILES.filter(f =>
    Object.entries(appliedTags).every(([cat, vals]) =>
      vals.some(v => f.tags.some(t => t.cat === cat && t.val === v))
    )
  );
  renderFiles(filtered);
}

// ─── Full-screen selector ───
function openAiFullscreen() {
  renderFsList();
  document.getElementById('aiFullscreen').classList.add('show');
}

function closeAiFullscreen() {
  document.getElementById('aiFullscreen').classList.remove('show');
}

function cancelAiFullscreen() {
  pendingTags = JSON.parse(JSON.stringify(appliedTags));
  closeAiFullscreen();
  closeAll();
}

function applyAiFullscreen() {
  closeAiFullscreen();
  updateRowBadge();
  confirmAiFilter();
}

function renderFsList() {
  const container = document.getElementById('fsList');
  container.innerHTML = SCHEMA.map(({cat, tags}) => {
    const sel = pendingTags[cat] || [];
    const isOpen = sel.length > 0;
    return `
      <div class="cat-row${isOpen?' open':''}" onclick="toggleCat(this)">
        <span class="cat-label">${cat}</span>
        ${sel.length > 0 ? `<span class="cat-count">${sel.length} 已选</span>` : ''}
        <span class="cat-expand-arrow">›</span>
      </div>
      <div class="cat-children">
        ${tags.map(tag => {
          const checked = sel.includes(tag);
          return `
            <div class="child-row" onclick="toggleTag('${cat}','${tag}',this)">
              <div class="cb${checked?' checked':''}"><span class="cb-tick">✓</span></div>
              <span class="child-label">${tag}</span>
            </div>`;
        }).join('')}
      </div>`;
  }).join('');
}

function toggleCat(el) {
  el.classList.toggle('open');
}

function toggleTag(cat, tag, rowEl) {
  if (!pendingTags[cat]) pendingTags[cat] = [];
  const idx = pendingTags[cat].indexOf(tag);
  if (idx === -1) pendingTags[cat].push(tag);
  else {
    pendingTags[cat].splice(idx, 1);
    if (!pendingTags[cat].length) delete pendingTags[cat];
  }
  // Re-render to update checkboxes and counts
  renderFsList();
  updateRowBadge();
}

  // placeholder for other filter buttons
}
